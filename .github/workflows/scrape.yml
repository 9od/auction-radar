name: 경매 데이터 자동 수집

on:
  schedule:
    # 매일 오전 7시 (KST) = UTC 22:00 전날
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # json 커밋 권한

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 스크래퍼 실행
        run: python scraper.py --pages 5 --output docs/auction_data.json

      - name: 수집 결과 커밋 & 푸시
        run: |
          git config user.name  "auction-radar-bot"
          git config user.email "bot@auction-radar"
          git add docs/auction_data.json
          git diff --staged --quiet || git commit -m "데이터 자동 수집 $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M')"
          git push
