name: 경매 데이터 자동 수집

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 KST 07:00
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Chrome 설치
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      - name: 패키지 설치
        run: pip install selenium beautifulsoup4 lxml webdriver-manager

      - name: 스크래퍼 실행
        run: python scraper.py --pages 5 --output docs/auction_data.json

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name  "auction-radar-bot"
          git config user.email "bot@auction-radar"
          git add docs/auction_data.json
          git diff --staged --quiet || git commit -m "데이터 자동 수집 $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M')"
          git push
